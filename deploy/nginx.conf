# 2PIX Nginx 配置示例
# 适用于 2核2G 香港服务器
#
# 使用方法：
# 1. 将此文件复制到 /etc/nginx/conf.d/2pix.conf
# 2. 修改 server_name 为你的域名
# 3. 修改 proxy_pass 端口（默认 3001）
# 4. nginx -t && nginx -s reload

server {
    listen 80;
    server_name your-domain.com;  # 替换为你的域名或 IP

    # 前端静态文件 - 由 Vite 构建到 dist 目录
    root /root/2pix/dist;  # 替换为你的项目路径
    index index.html;

    # Gzip 压缩 - 节省带宽（你有 512GB/月流量限制）
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 4;  # 2G 服务器用 4 级，平衡 CPU 和压缩率
    gzip_vary on;
    gzip_proxied any;

    # 静态资源缓存 - 减少重复请求
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;  # 静态资源不写日志，节省 IO
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # 代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置 - 上游 AI API 可能较慢
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;   # 图片/视频生成可能很慢
        proxy_read_timeout 120s;

        # 缓冲设置 - 2G 服务器减少内存占用
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;

        # 关闭代理缓冲（流式响应需要）
        proxy_buffering off;
    }

    # SPA 路由 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 限制请求体大小（上传文件等）
    client_max_body_size 50m;

    # 访问日志 - 生产环境可以降低级别
    access_log /var/log/nginx/2pix.access.log;
    error_log /var/log/nginx/2pix.error.log warn;
}
